<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controles de Figurinhas Copa 2026</title>

<style>

:root{
  --bg:#ffffff;
  --text:#111;
  --card:#f5f5f5;
}

.dark{
  --bg:#121212;
  --text:#ffffff;
  --card:#1e1e1e;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:20px;
  text-align:center;
  background:var(--card);
  font-size:22px;
  font-weight:bold;
}

.top{
  text-align:center;
  padding:15px;
}

input,
select{
  width:220px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:5px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:5px;
  background:#333;
  color:white;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:10px;
  padding:10px;
}

.sticker{
  padding:12px;
  border-radius:10px;
  text-align:center;
  position:relative;
  overflow:hidden;
  min-height:120px;
}

.none{
  background:#ff4d4d;
  color:white;
}

.have{
  background:#2ecc71;
  color:white;
}

.repeat{
  background:#006400;
  color:white;
}

.flag{
  width:26px;
  height:18px;
  display:block;
  margin:0 auto 5px;
}

.icon{
  margin-bottom:5px;
  font-size:20px;
}

.qty{
  font-size:12px;
  margin-top:5px;
}

.controls{
  position:absolute;
  bottom:6px;
  left:0;
  width:100%;
  height:30px;
}

.ctrl-btn{
  position:absolute;
  background:none;
  border:none;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  color:#fff;
  width:30px;
  height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:50;
  text-shadow:0 0 5px #000;
}

.minus{
  left:5px;
}

.plus{
  right:5px;
}

.counter{
  margin-top:10px;
  background:var(--card);
  display:inline-block;
  padding:12px;
  border-radius:12px;
  font-weight:bold;
}

.credit-bottom{
  text-align:center;
  margin:30px 0;
  padding-top:15px;
  border-top:1px solid rgba(0,0,0,0.1);
  font-size:13px;
  opacity:0.7;
}

</style>
</head>

<body>

<header>
Controles de Figurinhas Copa do Mundo 2026
</header>

<div class="top">

<input type="text" id="search" placeholder="Buscar figurinha...">

<br>

<select id="filter">
<option value="ALL">Todas</option>
</select>

<br>

<button onclick="setMode('all')">
Todas
</button>

<button onclick="setMode('repeat')">
Repetidas
</button>

<button onclick="setMode('missing')">
Faltando
</button>

<br>

<button onclick="toggleTheme()">
Tema
</button>

<button onclick="resetAlbum()">
Resetar
</button>

<button onclick="exportData()">
Exportar
</button>

<button onclick="importData()">
Importar
</button>

<div class="counter" id="counter"></div>

</div>

<div class="grid" id="grid"></div>

<div class="credit-bottom">
Desenvolvido por <strong>Gabriel Yamashita</strong> 🚀
</div>

<script>

// TIMES
const teams = {

BRA:{name:"Brasil",flag:"br"},
ARG:{name:"Argentina",flag:"ar"},
FRA:{name:"França",flag:"fr"},
GER:{name:"Alemanha",flag:"de"},
ESP:{name:"Espanha",flag:"es"},
POR:{name:"Portugal",flag:"pt"},
ENG:{name:"Inglaterra",flag:"gb"},
USA:{name:"Estados Unidos",flag:"us"},
URU:{name:"Uruguai",flag:"uy"},
CRO:{name:"Croácia",flag:"hr"},
MEX:{name:"México",flag:"mx"},
JPN:{name:"Japão",flag:"jp"},
KOR:{name:"Coreia do Sul",flag:"kr"},
MAR:{name:"Marrocos",flag:"ma"},
NED:{name:"Holanda",flag:"nl"},
BEL:{name:"Bélgica",flag:"be"},
SUI:{name:"Suíça",flag:"ch"},
COL:{name:"Colômbia",flag:"co"},
PAR:{name:"Paraguai",flag:"py"},
AUS:{name:"Austrália",flag:"au"}

};

let stickers = [];

// FIGURINHAS DOS TIMES
Object.keys(teams).forEach(team=>{

  for(let i=1;i<=20;i++){

    stickers.push({
      code:`${team} ${i}`,
      team:team
    });

  }

});

// FWC
for(let i=0;i<=19;i++){

  stickers.push({
    code:`FWC ${i.toString().padStart(2,'0')}`,
    team:"FWC"
  });

}

// CC
for(let i=1;i<=14;i++){

  stickers.push({
    code:`CC${i}`,
    team:"CC"
  });

}

const grid = document.getElementById("grid");

const counter = document.getElementById("counter");

const filter = document.getElementById("filter");

const search = document.getElementById("search");

let mode = "all";

// FILTROS
Object.keys(teams).forEach(t=>{

  let opt = document.createElement("option");

  opt.value = t;

  opt.textContent =
  `${t} (${teams[t].name})`;

  filter.appendChild(opt);

});

filter.innerHTML += `
<option value="FWC">FWC</option>
<option value="CC">CC</option>
`;

function getQty(code){

  return parseInt(localStorage.getItem(code)) || 0;

}

function setQty(code,qty){

  if(qty <= 0){

    localStorage.removeItem(code);

  }else{

    localStorage.setItem(code,qty);

  }

}

function setMode(m){

  mode = m;

  render();

}

function toggleTheme(){

  document.body.classList.toggle("dark");

}

function resetAlbum(){

  if(confirm("Apagar tudo?")){

    localStorage.clear();

    render();

  }

}

// EXPORTAR
function exportData(){

  let lista = [];

  stickers.forEach(s=>{

    let qty = getQty(s.code);

    // SALVA SÓ AS QUE TEM
    if(qty > 0){

      lista.push(`${s.code}=${qty}`);

    }

  });

  // COMPACTA
  let codigo = btoa(lista.join("|"));

  navigator.clipboard.writeText(codigo);

  alert("Código copiado!");

}

// IMPORTAR
function importData(){

  let codigo = prompt("Cole o código:");

  if(!codigo) return;

  try{

    let texto = atob(codigo);

    localStorage.clear();

    texto.split("|").forEach(item=>{

      let [code, qty] = item.split("=");

      if(code && qty){

        localStorage.setItem(code, qty);

      }

    });

    render();

    alert("Importado!");

  }catch{

    alert("Código inválido");

  }

}

function render(){

  grid.innerHTML = "";

  let owned = 0;

  let repeated = 0;

  stickers.forEach(s=>{

    let qty = getQty(s.code);

    // FILTROS
    if(
      filter.value !== "ALL" &&
      s.team !== filter.value
    ) return;

    if(mode === "repeat" && qty <= 1)
    return;

    if(mode === "missing" && qty > 0)
    return;

    if(
      search.value &&
      !s.code.toLowerCase()
      .includes(search.value.toLowerCase())
    ) return;

    if(qty > 0) owned++;

    if(qty > 1)
    repeated += qty - 1;

    let div =
    document.createElement("div");

    div.className =
    "sticker " +
    (
      qty === 0 ? "none" :
      qty === 1 ? "have" :
      "repeat"
    );

    div.innerHTML = `

      <div class="icon"></div>

      <div>${s.code}</div>

      <div class="qty">${qty}</div>

      <div class="controls">

        <button class="ctrl-btn minus">
        -
        </button>

        <button class="ctrl-btn plus">
        +
        </button>

      </div>

    `;

    let iconDiv =
    div.querySelector(".icon");

    // FWC
    if(s.team === "FWC"){

      iconDiv.textContent = "⭐";

    }

    // CC
    else if(s.team === "CC"){

      iconDiv.textContent = "🥤";

    }

    // BANDEIRAS
    else{

      let img =
      document.createElement("img");

      img.src =
      `https://flagcdn.com/w40/${teams[s.team].flag}.png`;

      img.className = "flag";

      iconDiv.appendChild(img);

    }

    // MENOS
    div.querySelector(".minus")
    .onclick = ()=>{

      if(qty > 0){

        setQty(
          s.code,
          qty - 1
        );

        render();

      }

    };

    // MAIS
    div.querySelector(".plus")
    .onclick = ()=>{

      setQty(
        s.code,
        qty + 1
      );

      render();

    };

    grid.appendChild(div);

  });

  let percent =
  (
    (owned / stickers.length) * 100
  ).toFixed(1);

  counter.innerHTML = `

    ${owned} / ${stickers.length}
    (${percent}%)

    <br>

    Repetidas:
    ${repeated}

  `;

}

search.oninput = render;

filter.onchange = render;

render();

</script>

</body>
</html>
